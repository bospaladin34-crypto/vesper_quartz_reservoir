      - Compiler: sdk/compiler.md
      - Intelligence Engine: sdk/intelligence.md
      - CLI Tool: sdk/cli.md
  - VSCode:
      - Extension: vscode/extension.md
      - IntelliSense: vscode/intellisense.md
  - Examples:
      - Santos Lagrangian: examples/santos_lagrangian_benthic.md
      - Riemann Lattice Tensor: examples/riemann_lattice_tensor.md
      - Benthic Ingestion: examples/benthic_ingestion.md