name: Vesper Genesis Orbital Forge

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    # STRUCTURAL MANDATE: SHIFT EXECUTION TO THE ANDROID SUB-DIRECTORY
    defaults:
      run:
        working-directory: ./android_ui

    steps:
      - name: Checkout Substrate
        uses: actions/checkout@v4

      - name: Anchor JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Initialize Orbital Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Forge Vesper Genesis APK
        run: gradle :app:assembleDebug

      - name: Transmit Artifact to Operator
        uses: actions/upload-artifact@v4
        with:
          name: Vesper-Genesis-Sovereign-APK
          path: android_ui/app/build/outputs/apk/debug/app-debug.apk
